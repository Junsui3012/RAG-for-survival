server {
    listen 80;
    server_name _;   # match any Host header — we're behind a reverse proxy

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    application/xml+rss image/svg+xml;

    # ── Static assets — aggressive caching ───────────────────────────────────
    # Vite appends a content hash to every JS/CSS filename (e.g. main.3f2a1b.js),
    # so a 1-year immutable cache is safe — the filename changes on every build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        # WHY try_files with /index.html fallback?
        # React Router (and all client-side routers) own the URL space.
        # When a user bookmarks /dashboard or hits F5 on /chat/123, the browser
        # sends that path to Nginx. Nginx knows nothing about React routes —
        # the route only exists inside the JavaScript bundle.
        # `try_files $uri $uri/ /index.html` tells Nginx:
        #   1. Try to serve the file literally (covers real assets like /logo.png).
        #   2. Try it as a directory.
        #   3. Fall back to /index.html so React's router can take over.
        # Without this fallback, every hard refresh on a sub-route returns 404.
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy → backend Express service ───────────────────────────
    location /api/ {
        # `backend` resolves via Docker's internal DNS to the backend container.
        # Nginx strips nothing — /api/health reaches Express as /api/health.
        proxy_pass http://backend:5000;

        # Use HTTP/1.1 to support keep-alive connections and chunked transfer.
        # HTTP/1.0 would force connection: close on every request.
        proxy_http_version 1.1;

        # WHY Connection ''?
        # HTTP/1.1 keep-alive requires the Connection header to be cleared
        # before forwarding. Without this, upstream servers receive the
        # hop-by-hop `Connection: keep-alive` header, which is illegal to
        # forward under RFC 7230 §6.1.
        # For SSE (Server-Sent Events) specifically: SSE is a long-lived
        # HTTP response. If Nginx forwards `Connection: close`, the browser's
        # EventSource will disconnect and retry every few seconds.
        # Setting it to '' (empty string) removes the header entirely,
        # allowing the persistent connection to stay open for the full stream.
        proxy_set_header Connection '';

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WHY proxy_buffering off?
        # By default Nginx buffers the entire upstream response in memory
        # before sending it to the client. This is efficient for normal JSON
        # responses but *fatal* for SSE and streaming:
        #   • SSE events (data: … \n\n) are sent incrementally over minutes.
        #   • If Nginx buffers them, the browser receives nothing until the
        #     stream closes (or the buffer fills), defeating the purpose of
        #     streaming entirely.
        # `proxy_buffering off` forces Nginx to flush each chunk to the client
        # as soon as it arrives from Express/FastAPI.
        proxy_buffering off;

        # Disable the proxy-level response cache — SSE events must not be
        # served from a stale cache entry.
        proxy_cache off;

        # Allow chunked transfer encoding from the upstream so streaming
        # responses don't need a Content-Length header upfront.
        chunked_transfer_encoding on;

        # Give the upstream plenty of time to stream a long AI response.
        # Default is 60s; increase to 5 minutes for slow LLM completions.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}